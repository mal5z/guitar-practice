  { value: "not_started", label: "Not Started", color: "#94a3b8", bg: "#f1f5f9", emoji: "○" },
  { value: "learning", label: "Learning", color: "#d97706", bg: "#fef3c7", emoji: "🟡" },

const SECTION_OPTIONS = ["Intro", "Verse", "Chorus", "Bridge", "Outro", "Solo Section", "Full Run-Through"];

function getDaysUntilShow() {
  const today = new Date(); today.setHours(0,0,0,0);
  const show = new Date(2026, 3, 24); // April 24 (month is 0-indexed)
  return Math.max(0, Math.round((show - today) / (1000 * 60 * 60 * 24)));
}
function formatDateFull(ds) {
  return new Date(ds).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}

// ══════════════════════════════════════════
// CLOUD SYNC
// ══════════════════════════════════════════
function useCloudSync() {
  const [syncStatus, setSyncStatus] = useState("connected");
  const [lastSync, setLastSync] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const token = "guitar2026apm";

  async function cloudGet(key) {
    try {
      const resp = await fetch(`${API_URL}?token=${token}&key=${encodeURIComponent(key)}`);
      const data = await resp.json();
      return data.value;
    } catch (e) {
      console.error(`Cloud GET ${key} failed:`, e);
      setSyncStatus("error");
      return null;
    }
  }

  async function cloudSave(dataObj) {
    setSyncing(true);
    try {
      const resp = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ token, data: dataObj }),
      });
      const result = await resp.json();
      if (result.success) {
        setLastSync(new Date());
        setSyncStatus("connected");
      }
      setSyncing(false);
      return result.success;
    } catch (e) {
      console.error("Cloud SAVE failed:", e);
      setSyncStatus("error");
      setSyncing(false);
      return false;
    }
  }

  return { syncStatus, lastSync, syncing, cloudGet, cloudSave };
}

// ══════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════
function App() {
  const [view, setView] = useState("dashboard"); // dashboard | song | export
  const [selectedSong, setSelectedSong] = useState(null);
  const [songProgress, setSongProgress] = useState({});
  const [practiceLogs, setPracticeLogs] = useState([]);
  const [customLinks, setCustomLinks] = useState({});
  const [tabPdfs, setTabPdfs] = useState({});
  const [songOverrides, setSongOverrides] = useState({});
  const [loading, setLoading] = useState(true);
  const [showLogForm, setShowLogForm] = useState(false);
  const [exportText, setExportText] = useState("");
  const [copied, setCopied] = useState(false);
  const [showAllSongs, setShowAllSongs] = useState(false);
  const [logForm, setLogForm] = useState({ tempo: "", sections: [], notes: "", minutes: "" });
  const [editingTutorial, setEditingTutorial] = useState(null);
  const [editingPlayAlong, setEditingPlayAlong] = useState(null);
  const [editingUgTab, setEditingUgTab] = useState(null);
  const [tutorialUrl, setTutorialUrl] = useState("");
  const [playAlongUrl, setPlayAlongUrl] = useState("");
  const [ugTabUrl, setUgTabUrl] = useState("");
  const [editingCapo, setEditingCapo] = useState(null);
  const [capoValue, setCapoValue] = useState("");
  const [editingChords, setEditingChords] = useState(null);
  const [chordsValue, setChordsValue] = useState("");
  const [editingNotes, setEditingNotes] = useState(null);
  const [notesValue, setNotesValue] = useState("");

  const cloud = useCloudSync();
  const dataLoaded = useRef(false);

  useEffect(() => {
    if (!dataLoaded.current) {
      dataLoaded.current = true;
      loadFromCloud();
    }
  }, []);

  async function loadFromCloud() {
    try {
      const [progress, logs, links, pdfs, overrides] = await Promise.all([
        cloud.cloudGet("apm-song-progress"),
        cloud.cloudGet("apm-practice-logs"),
        cloud.cloudGet("apm-custom-links"),
        cloud.cloudGet("apm-tab-pdfs"),
        cloud.cloudGet("apm-song-overrides"),
      ]);
      if (progress) setSongProgress(progress);
      if (logs) setPracticeLogs(logs);
      if (links) setCustomLinks(links);
      if (pdfs) setTabPdfs(pdfs);
      if (overrides) setSongOverrides(overrides);
    } catch (e) { console.error("Load failed:", e); }
    setLoading(false);
  }

  async function saveToCloud(key, data, setter) {
    setter(data);
    // Also cache locally for instant reads
    localStorage.setItem(key, JSON.stringify(data));
    await cloud.cloudSave({ [key]: data });
  }

  const updateStatus = (id, s) => saveToCloud("apm-song-progress", { ...songProgress, [id]: s }, setSongProgress);
  const getStatus = (id) => songProgress[id] || "not_started";
  const getStatusInfo = (s) => STATUS_OPTIONS.find(o => o.value === s) || STATUS_OPTIONS[0];
  const songLogs = (id) => practiceLogs.filter(l => l.songId === id);
  const lastPracticed = (id) => { const l = songLogs(id); return l.length > 0 ? l[0].date : null; };

  function addLog(songId) {
    const entry = { id: Date.now().toString(), songId, date: new Date().toISOString(), tempo: logForm.tempo ? parseInt(logForm.tempo) : null, sections: logForm.sections, notes: logForm.notes, minutes: logForm.minutes ? parseInt(logForm.minutes) : null };
    saveToCloud("apm-practice-logs", [entry, ...practiceLogs], setPracticeLogs);
    setLogForm({ tempo: "", sections: [], notes: "", minutes: "" });
    setShowLogForm(false);
  }
  function deleteLog(logId) { saveToCloud("apm-practice-logs", practiceLogs.filter(l => l.id !== logId), setPracticeLogs); }
  function toggleSection(sec) {
    setLogForm(p => ({ ...p, sections: p.sections.includes(sec) ? p.sections.filter(s => s !== sec) : [...p.sections, sec] }));
  }

  const getTutorial = (s) => customLinks[s.id]?.tutorial || s.tutorial;
  const getPlayAlong = (s) => customLinks[s.id]?.playAlong || s.playAlong;
  const getUgTab = (s) => customLinks[s.id]?.ugTab || null;
  const getCapo = (s) => songOverrides[s.id]?.capo !== undefined ? songOverrides[s.id].capo : s.capo;
  const getShapes = (s) => songOverrides[s.id]?.shapes !== undefined ? songOverrides[s.id].shapes : s.shapes;
  const getNotes = (s) => songOverrides[s.id]?.notes !== undefined ? songOverrides[s.id].notes : (s.notes || "");

  function saveCapo(songId) {
    const val = capoValue.trim();
    const capo = val === "" || val === "0" ? null : parseInt(val) || null;
    saveToCloud("apm-song-overrides", { ...songOverrides, [songId]: { ...(songOverrides[songId] || {}), capo } }, setSongOverrides);
    setEditingCapo(null); setCapoValue("");
  }
  function saveChords(songId) {
    const shapes = chordsValue.split(",").map(s => s.trim()).filter(Boolean);
    saveToCloud("apm-song-overrides", { ...songOverrides, [songId]: { ...(songOverrides[songId] || {}), shapes } }, setSongOverrides);
    setEditingChords(null); setChordsValue("");
  }
  function saveNotes(songId) {
    saveToCloud("apm-song-overrides", { ...songOverrides, [songId]: { ...(songOverrides[songId] || {}), notes: notesValue } }, setSongOverrides);
    setEditingNotes(null); setNotesValue("");
  }

  function saveTutorial(songId) {
    if (!tutorialUrl.trim()) return;
    saveToCloud("apm-custom-links", { ...customLinks, [songId]: { ...(customLinks[songId] || {}), tutorial: tutorialUrl.trim() } }, setCustomLinks);
    setEditingTutorial(null); setTutorialUrl("");
  }
  function savePlayAlong(songId) {
    if (!playAlongUrl.trim()) return;
    saveToCloud("apm-custom-links", { ...customLinks, [songId]: { ...(customLinks[songId] || {}), playAlong: playAlongUrl.trim() } }, setCustomLinks);
    setEditingPlayAlong(null); setPlayAlongUrl("");
  }
  function saveUgTab(songId) {
    if (!ugTabUrl.trim()) return;
    saveToCloud("apm-custom-links", { ...customLinks, [songId]: { ...(customLinks[songId] || {}), ugTab: ugTabUrl.trim() } }, setCustomLinks);
    setEditingUgTab(null); setUgTabUrl("");
  }

  function handlePdfUpload(songId, file) {
    if (!file || file.type !== "application/pdf") return;
    const reader = new FileReader();
    reader.onload = () => {
      const newPdfs = { ...tabPdfs, [songId]: { name: file.name, data: reader.result } };
      saveToCloud("apm-tab-pdfs", newPdfs, setTabPdfs);
    };
    reader.readAsDataURL(file);
  }

  function openPdf(songId) {
    const pdf = tabPdfs[songId];
    if (!pdf) return;
    const byteString = atob(pdf.data.split(",")[1]);
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
    const blob = new Blob([ab], { type: "application/pdf" });
    window.open(URL.createObjectURL(blob), "_blank");
  }

  function removePdf(songId) {
    const newPdfs = { ...tabPdfs };
    delete newPdfs[songId];
    saveToCloud("apm-tab-pdfs", newPdfs, setTabPdfs);
  }

  function generateExport(days) {
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    const recent = practiceLogs.filter(l => new Date(l.date) >= cutoff);
    const my = SONGS.filter(s => s.playing);
    const d = getDaysUntilShow();
    let t = `APM Guitar Practice Update (last ${days} days)\nShow: April 24 · ${d} days away\n\n`;
    const lines = [];
    for (const song of my) {
      const st = getStatusInfo(getStatus(song.id));
      const logs = recent.filter(l => l.songId === song.id);
      if (logs.length === 0 && st.value === "not_started") continue;
      let line = `${song.name} — ${st.label}`;
      if (logs.length > 0) {
        line += ` · ${logs.length}x`;
        const tempos = logs.filter(l => l.tempo).map(l => l.tempo);
        if (tempos.length) line += ` · max ${Math.max(...tempos)}% speed`;
        const secs = [...new Set(logs.flatMap(l => l.sections))];
        if (secs.length) line += ` · worked on: ${secs.join(", ")}`;
        const notes = logs.filter(l => l.notes);
        if (notes.length) line += ` · latest: "${notes[0].notes}"`;
      }
      lines.push(line);
    }
    const pr = my.filter(s => getStatus(s.id) === "performance_ready");
    const ns = my.filter(s => getStatus(s.id) === "not_started");
    t += lines.length > 0 ? lines.join("\n") + "\n" : "No practice logged.\n";
    t += `\nOverall: ${pr.length}/${my.length} performance ready`;
    if (ns.length) t += ` · ${ns.length} not started`;
    t += `\nSessions this period: ${recent.length}`;
    return t;
  }

  function openSong(id) { setSelectedSong(id); setView("song"); setShowLogForm(false); }
  function goBack() { setView("dashboard"); setSelectedSong(null); setShowLogForm(false); }

  // ═══════════════════════════════════════════
  // LOADING
  // ═══════════════════════════════════════════
  if (loading) {

        <div>Syncing...</div>
      </div>
    );
  }

  const mySongs = SONGS.filter(s => s.playing).sort((a, b) => a.order - b.order);

  // ═══════════════════════════════════════════
  // SONG DETAIL
  // ═══════════════════════════════════════════
  if (view === "song" && selectedSong) {
    const song = SONGS.find(s => s.id === selectedSong);
    if (!song) { goBack(); return null; }
    const status = getStatus(song.id);
    const info = getStatusInfo(status);
    const logs = songLogs(song.id);
    const tut = getTutorial(song);
    const pa = getPlayAlong(song);
    const ug = getUgTab(song);

    return (
      <div>
        <button className="back-btn" onClick={goBack}>← Back</button>
        <h1 style={{ fontSize: 24, fontWeight: 700, margin: "8px 0 0", color: "#0f172a" }}>{song.name}</h1>
        <div style={{ color: "#64748b", fontSize: 14, marginBottom: 16 }}>{song.artist} · #{song.order} in setlist{song.acoustic ? " · 🎸 Acoustic" : ""}</div>

        {/* Song Info */}
        <div className="section">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12, textAlign: "center" }}>
            <div><div className="label">Key</div><div style={{ fontSize: 20, fontWeight: 700, color: "#0f172a" }}>{song.key}</div></div>
            <div><div className="label">BPM</div><div style={{ fontSize: 20, fontWeight: 700, color: "#0f172a" }}>{song.bpm}</div></div>
            <div onClick={() => { if (editingCapo !== song.id) { setEditingCapo(song.id); setCapoValue(getCapo(song) != null ? String(getCapo(song)) : ""); } }} style={{ cursor: "pointer" }}>
              <div className="label">Capo</div>
              {editingCapo === song.id ? (
                <div style={{ display: "flex", gap: 4, alignItems: "center", justifyContent: "center" }}>
                  <input className="input" style={{ width: 50, textAlign: "center", padding: "4px 6px", fontSize: 16 }} type="number" min="0" max="12" value={capoValue} onChange={e => setCapoValue(e.target.value)} autoFocus onKeyDown={e => { if (e.key === "Enter") saveCapo(song.id); if (e.key === "Escape") setEditingCapo(null); }} />
                  <button onClick={(e) => { e.stopPropagation(); saveCapo(song.id); }} className="btn btn-p" style={{ padding: "4px 8px", fontSize: 12 }}>✓</button>
                </div>
              ) : (
                <div style={{ fontSize: 20, fontWeight: 700, color: "#0f172a" }}>{getCapo(song) || "—"} <span style={{ fontSize: 11, color: "#94a3b8" }}>✎</span></div>
              )}
            </div>
            {(() => {
              const latest = logs.find(l => l.tempo);
              return <div><div className="label">Latest</div><div style={{ fontSize: 20, fontWeight: 700, color: latest && latest.tempo >= 100 ? "#16a34a" : "#0f172a" }}>{latest ? `${latest.tempo}%` : "—"}</div></div>;
            })()}
          </div>
        </div>

        {/* Notes */}
        <div className="section">
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: "#0f172a" }}>Notes</div>
            {editingNotes !== song.id && <button onClick={() => { setEditingNotes(song.id); setNotesValue(getNotes(song)); }} className="edit-btn">edit</button>}
          </div>
          {editingNotes === song.id ? (
            <div>
              <textarea className="input" style={{ minHeight: 80, resize: "vertical", fontFamily: "inherit" }} value={notesValue} onChange={e => setNotesValue(e.target.value)} autoFocus placeholder="Add notes about this song..." />
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                <button onClick={() => saveNotes(song.id)} className="btn btn-p btn-sm">Save</button>
                <button onClick={() => setEditingNotes(null)} className="btn btn-s btn-sm">Cancel</button>
              </div>
            </div>
          ) : (
            getNotes(song) ? <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{getNotes(song)}</div>
            : <div style={{ fontSize: 13, color: "#94a3b8", fontStyle: "italic" }}>No notes yet</div>
          )}
        </div>

        {/* Resources */}
        <div className="section">
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10, color: "#0f172a" }}>Resources</div>
          {/* ── Filled resources first ── */}
          {tut && editingTutorial !== song.id && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <a href={tut} target="_blank" rel="noreferrer" className="link-btn">🎓 Tutorial ↗</a>
              <button onClick={() => { setEditingTutorial(song.id); setTutorialUrl(tut); }} className="edit-btn">edit</button>
            </div>
          )}
          {pa && editingPlayAlong !== song.id && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <a href={pa} target="_blank" rel="noreferrer" className="link-btn">🎵 Play Along ↗</a>
              <button onClick={() => { setEditingPlayAlong(song.id); setPlayAlongUrl(pa); }} className="edit-btn">edit</button>
            </div>
          )}
          {ug && editingUgTab !== song.id && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <a href={ug} target="_blank" rel="noreferrer" className="link-btn">📄 UG Tab ↗</a>
              <button onClick={() => { setEditingUgTab(song.id); setUgTabUrl(ug); }} className="edit-btn">edit</button>
            </div>
          )}
          {tabPdfs[song.id] && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <button onClick={() => openPdf(song.id)} className="link-btn">📄 Tab PDF ↗</button>
              <button onClick={() => removePdf(song.id)} className="edit-btn">remove</button>
            </div>
          )}
          {/* ── Edit forms (shown inline when editing) ── */}
          {editingTutorial === song.id && (
            <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              <input className="input" style={{ flex: 1 }} placeholder="Tutorial URL" value={tutorialUrl} onChange={e => setTutorialUrl(e.target.value)} />
              <button onClick={() => saveTutorial(song.id)} className="btn btn-p btn-sm">Save</button>
              <button onClick={() => { setEditingTutorial(null); setTutorialUrl(""); }} className="btn btn-s btn-sm">✕</button>
            </div>
          )}
          {editingPlayAlong === song.id && (
            <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              <input className="input" style={{ flex: 1 }} placeholder="Play-along URL" value={playAlongUrl} onChange={e => setPlayAlongUrl(e.target.value)} />
              <button onClick={() => savePlayAlong(song.id)} className="btn btn-p btn-sm">Save</button>
              <button onClick={() => { setEditingPlayAlong(null); setPlayAlongUrl(""); }} className="btn btn-s btn-sm">✕</button>
            </div>
          )}
          {editingUgTab === song.id && (
            <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              <input className="input" style={{ flex: 1 }} placeholder="Ultimate Guitar tab URL" value={ugTabUrl} onChange={e => setUgTabUrl(e.target.value)} />
              <button onClick={() => saveUgTab(song.id)} className="btn btn-p btn-sm">Save</button>
              <button onClick={() => { setEditingUgTab(null); setUgTabUrl(""); }} className="btn btn-s btn-sm">✕</button>
            </div>
          )}
          {/* ── Add buttons for unfilled resources ── */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: (tut || pa || ug || tabPdfs[song.id]) ? 4 : 0 }}>
            {!tut && editingTutorial !== song.id && (
              <button onClick={() => setEditingTutorial(song.id)} className="btn btn-s btn-sm">+ Tutorial</button>
            )}
            {!pa && editingPlayAlong !== song.id && (
              <button onClick={() => setEditingPlayAlong(song.id)} className="btn btn-s btn-sm">+ Play Along</button>
            )}
            {!ug && editingUgTab !== song.id && (
              <button onClick={() => setEditingUgTab(song.id)} className="btn btn-s btn-sm">+ UG Tab</button>
            )}
            {!tabPdfs[song.id] && (
              <label className="btn btn-s btn-sm" style={{ display: "inline-block", cursor: "pointer" }}>
                + Tab PDF
                <input type="file" accept="application/pdf" style={{ display: "none" }}
                  onChange={e => { if (e.target.files[0]) handlePdfUpload(song.id, e.target.files[0]); }} />
              </label>
            )}
          </div>
        </div>

        {/* Progress */}
        <div className="section">
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 10, color: "#0f172a" }}>Progress</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {STATUS_OPTIONS.map(opt => (
              <button key={opt.value} onClick={() => updateStatus(song.id, opt.value)}
                className="chip" style={status === opt.value ? { background: opt.bg, borderColor: opt.color, color: opt.color, fontWeight: 700 } : {}}>
                {opt.emoji} {opt.label}
              </button>
            ))}
          </div>
        </div>

        {/* Log Practice */}
        {!showLogForm ? (
          <button onClick={() => setShowLogForm(true)} className="btn btn-p btn-full" style={{ marginBottom: 12 }}>
            + Log Practice Session
          </button>
        ) : (
          <div className="section" style={{ border: "2px solid #2563eb" }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12, color: "#0f172a" }}>Log Practice</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
              <div><label className="label">% Full Speed</label><input className="input" type="number" min="0" max="100" placeholder="e.g. 80" value={logForm.tempo} onChange={e => setLogForm({...logForm, tempo: e.target.value})} /></div>
              <div><label className="label">Minutes</label><input className="input" type="number" placeholder="Minutes" value={logForm.minutes} onChange={e => setLogForm({...logForm, minutes: e.target.value})} /></div>
            </div>
            <div style={{ marginBottom: 10 }}>
              <label className="label" style={{ marginBottom: 6 }}>Sections worked</label>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {SECTION_OPTIONS.map(sec => (
                  <button key={sec} onClick={() => toggleSection(sec)} className={`chip ${logForm.sections.includes(sec) ? "chip-on" : ""}`}>{sec}</button>
                ))}
              </div>
            </div>
            <div style={{ marginBottom: 12 }}><label className="label">Notes</label><input className="input" placeholder="How'd it go?" value={logForm.notes} onChange={e => setLogForm({...logForm, notes: e.target.value})} /></div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => addLog(song.id)} className="btn btn-p" style={{ flex: 1 }}>Save</button>
              <button onClick={() => setShowLogForm(false)} className="btn btn-s">Cancel</button>
            </div>
          </div>
        )}

        {/* History */}
        {logs.length > 0 && <>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 8, marginTop: 8, color: "#0f172a" }}>Practice History</div>
          {logs.map(log => (
            <div key={log.id} style={{ background: "#f8fafc", borderRadius: 10, padding: 12, marginBottom: 8, border: "1px solid #e2e8f0" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 13, color: "#64748b", fontWeight: 500 }}>{formatDateFull(log.date)}</span>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  {log.tempo && <span className="badge" style={{ background: log.tempo >= 100 ? "#f0fdf4" : "#f8fafc", color: log.tempo >= 100 ? "#16a34a" : "#64748b", border: `1px solid ${log.tempo >= 100 ? "#bbf7d0" : "#e2e8f0"}` }}>{log.tempo}%</span>}
                  {log.minutes && <span className="badge" style={{ background: "#f8fafc", color: "#64748b", border: "1px solid #e2e8f0" }}>{log.minutes}m</span>}
                  <button onClick={() => deleteLog(log.id)} className="delete-btn">✕</button>
                </div>
              </div>
              {log.sections.length > 0 && <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>{log.sections.join(" · ")}</div>}
              {log.notes && <div style={{ fontSize: 13, color: "#475569", marginTop: 4 }}>{log.notes}</div>}
            </div>
          ))}
        </>}
      </div>
    );
  }

  // ═══════════════════════════════════════════
  // EXPORT VIEW
  // ═══════════════════════════════════════════
  if (view === "export") {
    return (
      <div>
        <button className="back-btn" onClick={goBack}>← Back</button>
        <h2 style={{ fontSize: 20, fontWeight: 700, margin: "8px 0 4px", color: "#0f172a" }}>Export for Guitar Tutor</h2>
        <p style={{ fontSize: 13, color: "#64748b", marginBottom: 16 }}>Copy and paste into your GUITAR TUTOR chat.</p>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          {[7, 14, 30].map(d => (
            <button key={d} onClick={() => { setExportText(generateExport(d)); setCopied(false); }} className="btn btn-s btn-sm">{d} days</button>
          ))}
        </div>
        {exportText && <>
          <div style={{ background: "#f1f5f9", borderRadius: 10, padding: 14, fontFamily: "monospace", fontSize: 12, whiteSpace: "pre-wrap", color: "#334155", maxHeight: 300, overflow: "auto", lineHeight: 1.6, border: "1px solid #e2e8f0" }}>
            {exportText}
          </div>
          <button onClick={() => { navigator.clipboard.writeText(exportText).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); }}
            className="btn btn-p btn-full" style={{ marginTop: 12 }}>
            {copied ? "✓ Copied!" : "Copy to Clipboard"}
          </button>
        </>}
      </div>
    );
  }

  // ═══════════════════════════════════════════
  // DASHBOARD
  // ═══════════════════════════════════════════
  return (
    <div>
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <h1 style={{ fontSize: 22, fontWeight: 700, margin: 0, color: "#0f172a" }}>APM Show Prep 🎸</h1>
        <div style={{ fontSize: 13, color: "#64748b", marginTop: 4 }}>April 24, 2026 · Sidley Partners Meeting</div>
        <div style={{ display: "inline-flex", alignItems: "baseline", gap: 6, background: daysUntil <= 14 ? "#fef2f2" : daysUntil <= 30 ? "#fffbeb" : "#eff6ff", border: `1px solid ${daysUntil <= 14 ? "#fecaca" : daysUntil <= 30 ? "#fde68a" : "#bfdbfe"}`, borderRadius: 12, padding: "10px 20px", marginTop: 12 }}>
          <span style={{ fontSize: 32, fontWeight: 800, color: daysUntil <= 14 ? "#dc2626" : daysUntil <= 30 ? "#d97706" : "#2563eb" }}>{daysUntil}</span>
          <span style={{ fontSize: 14, color: "#64748b" }}>days to go</span>
        </div>
        <div style={{ background: "#e2e8f0", borderRadius: 8, height: 8, marginTop: 12, overflow: "hidden" }}>
          <div style={{ height: "100%", borderRadius: 8, background: "linear-gradient(90deg, #3b82f6, #22c55e)", width: `${(perfReady / mySongs.length) * 100}%`, transition: "width 0.3s" }} />
        </div>
        <div style={{ fontSize: 12, color: "#64748b", marginTop: 4 }}>{perfReady}/{mySongs.length} songs performance ready</div>
        {cloud.lastSync && <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4 }}>Synced {cloud.lastSync.toLocaleTimeString()}</div>}
      </div>

      <div style={{ fontSize: 13, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Your {mySongs.length} Songs</div>

      {mySongs.map(song => {
        const status = getStatus(song.id);
        const info = getStatusInfo(status);
        const lp = lastPracticed(song.id);
        const lc = songLogs(song.id).length;
        const ds = lp ? Math.floor((new Date() - new Date(lp)) / 86400000) : null;
        const latestSpeed = songLogs(song.id).find(l => l.tempo);
        return (
          <div key={song.id} onClick={() => openSong(song.id)}
            className={`card ${status === "performance_ready" ? "card-ready" : ""}`}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600 }}>#{song.order}</span>
                  <span style={{ fontSize: 16, fontWeight: 600, color: "#0f172a" }}>{song.name}</span>
                </div>
                <div style={{ fontSize: 13, color: "#64748b" }}>{song.artist}</div>
              </div>
              <span style={{ fontSize: 18 }}>{info.emoji}</span>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap", alignItems: "center" }}>
              <span className="badge" style={{ background: "#f1f5f9", color: "#64748b", border: "1px solid #e2e8f0" }}>{song.bpm} BPM</span>
              {song.acoustic && <span className="badge" style={{ background: "#fef3c7", color: "#92400e", border: "1px solid #fde68a" }}>🎸 Acoustic</span>}
              {getCapo(song) && <span className="badge" style={{ background: "#f1f5f9", color: "#64748b", border: "1px solid #e2e8f0" }}>Capo {getCapo(song)}</span>}
              <span className="badge" style={{ background: info.bg, color: info.color, border: `1px solid ${info.color}33` }}>{info.label}</span>
              {latestSpeed && <span className="badge" style={{ background: latestSpeed.tempo >= 100 ? "#f0fdf4" : "#f8fafc", color: latestSpeed.tempo >= 100 ? "#16a34a" : "#64748b", border: `1px solid ${latestSpeed.tempo >= 100 ? "#bbf7d0" : "#e2e8f0"}` }}>{latestSpeed.tempo}%</span>}
              {lc > 0 && <span style={{ fontSize: 11, color: "#94a3b8" }}>{lc} session{lc > 1 ? "s" : ""}</span>}
              {ds !== null && ds > 3 && <span style={{ fontSize: 11, color: "#d97706", fontWeight: 600 }}>{ds}d ago</span>}
            </div>
            {(() => {
              const res = [
                getTutorial(song) && "Tutorial",
                getPlayAlong(song) && "Play Along",
                getUgTab(song) && "UG Tab",
                tabPdfs[song.id] && "PDF",
              ].filter(Boolean);
              return res.length > 0 ? <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4 }}>✓ {res.join(" · ")}</div> : null;
            })()}
          </div>
        );
      })}

      <button onClick={() => setShowAllSongs(!showAllSongs)}
        className="btn btn-s" style={{ width: "100%", marginTop: 16, fontSize: 13 }}>
        {showAllSongs ? "Hide" : "Show"} Other Setlist Songs ({otherSongs.length})
      </button>
      {showAllSongs && <div style={{ marginTop: 8 }}>
        {otherSongs.map(song => (
          <div key={song.id} className="card" style={{ opacity: 0.5, cursor: "default" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 12, color: "#94a3b8" }}>#{song.order}</span>
              <span style={{ fontSize: 14, color: "#64748b" }}>{song.name}</span>
              {song.artist && <span style={{ fontSize: 12, color: "#94a3b8" }}>— {song.artist}</span>}
            </div>
            {song.notes && <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 4 }}>{song.notes}</div>}
          </div>
        ))}
      </div>}

      <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)" }}>
        <button onClick={() => { setExportText(generateExport(7)); setView("export"); setCopied(false); }}
          className="btn btn-s" style={{ borderRadius: 24, boxShadow: "0 2px 12px rgba(0,0,0,.1)", border: "1px solid #cbd5e1", display: "flex", alignItems: "center", gap: 6 }}>
          📋 Export for Tutor
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
